name: Sync from Notion (Public Scraper)

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install scraper dependencies
        run: npm install cheerio turndown

      - name: Scrape Notion public site
        run: node scripts/notion-scrape.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs: sync content from Notion public site"
          title: "docs: automated Notion content sync"
          body: |
            Automated content sync scraped from the public Notion Help Center.

            No API token needed — this scrapes the publicly accessible pages at
            `mindflowio.notion.site`.

            Please review the changes before merging.
          branch: notion-sync/auto-update
          delete-branch: true
          labels: documentation, automated
